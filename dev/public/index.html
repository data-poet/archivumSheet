<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Character Builder Tester</title>
    <style>
      body {
        font-family: Arial;
        padding: 20px;
      }
      .box {
        margin-bottom: 20px;
        padding: 10px;
        border: 1px solid #ccc;
      }
      select,
      button,
      input {
        margin: 5px 0;
      }
      table {
        border-collapse: collapse;
      }
      td,
      th {
        padding: 5px 10px;
        border: 1px solid #ccc;
      }
    </style>
  </head>

  <body>
    <h1>Character Builder Test</h1>

    <!-- PRIMARY ATTRIBUTES -->
    <div class="box">
      <h2>Primary Attributes</h2>

      <table>
        <tr>
          <th>Attribute</th>
          <th>Base</th>
          <th>Modifier</th>
          <th>Actual Value</th>
        </tr>

        <tr>
          <td>ST</td>
          <td>
            <input id="ST_base" type="number" min="1" max="20" value="10" />
          </td>
          <td><input id="ST_mod" type="number" value="0" /></td>
          <td id="ST_actual">10</td>
        </tr>

        <tr>
          <td>DX</td>
          <td>
            <input id="DX_base" type="number" min="1" max="20" value="10" />
          </td>
          <td><input id="DX_mod" type="number" value="0" /></td>
          <td id="DX_actual">10</td>
        </tr>

        <tr>
          <td>IQ</td>
          <td>
            <input id="IQ_base" type="number" min="1" max="20" value="10" />
          </td>
          <td><input id="IQ_mod" type="number" value="0" /></td>
          <td id="IQ_actual">10</td>
        </tr>

        <tr>
          <td>HT</td>
          <td>
            <input id="HT_base" type="number" min="1" max="20" value="10" />
          </td>
          <td><input id="HT_mod" type="number" value="0" /></td>
          <td id="HT_actual">10</td>
        </tr>
      </table>
    </div>

    <!-- ADVANTAGES -->
    <div class="box">
      <h2>Advantages</h2>
      <button onclick="loadAdvantages()">Load Advantages</button><br />

      <select id="advSelect"></select>
      <button onclick="addAdv()">Add Advantage</button>

      <ul id="advList"></ul>
    </div>

    <!-- DISADVANTAGES -->
    <div class="box">
      <h2>Disadvantages</h2>
      <button onclick="loadDisadvantages()">Load Disadvantages</button><br />

      <select id="disSelect"></select>
      <button onclick="addDis()">Add Disadvantage</button>

      <ul id="disList"></ul>
    </div>

    <!-- RUN ENGINE -->
    <div class="box">
      <button onclick="runEngine()">RUN CHARACTER BUILDER</button>
    </div>

    <!-- OUTPUT -->
    <div class="box">
      <h2>Output</h2>
      <pre id="out"></pre>
    </div>

    <script>
      let advantages = [];
      let disadvantages = [];

      let selectedAdv = [];
      let selectedDis = [];

      // -----------------------
      // DEBOUNCE (AUTO RUN)
      // -----------------------
      let debounceTimer;

      function triggerAutoRun() {
        updateActualValues();

        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
          runEngine();
        }, 300);
      }

      // -----------------------
      // PRIMARY ATTRIBUTES
      // -----------------------
      function getPrimaryAttributes() {
        return {
          ST: {
            base_value: Number(document.getElementById("ST_base").value),
            modifier: Number(document.getElementById("ST_mod").value),
          },
          DX: {
            base_value: Number(document.getElementById("DX_base").value),
            modifier: Number(document.getElementById("DX_mod").value),
          },
          IQ: {
            base_value: Number(document.getElementById("IQ_base").value),
            modifier: Number(document.getElementById("IQ_mod").value),
          },
          HT: {
            base_value: Number(document.getElementById("HT_base").value),
            modifier: Number(document.getElementById("HT_mod").value),
          },
        };
      }

      function updateActualValues() {
        const attrs = ["ST", "DX", "IQ", "HT"];

        attrs.forEach((attr) => {
          const base =
            Number(document.getElementById(`${attr}_base`).value) || 0;
          const modInput = document.getElementById(`${attr}_mod`).value;

          const mod = modInput === "" ? 0 : Number(modInput);

          const actual = base + mod;

          document.getElementById(`${attr}_actual`).textContent = actual;
        });
      }

      function setupAutoRun() {
        const inputs = [
          "ST_base",
          "ST_mod",
          "DX_base",
          "DX_mod",
          "IQ_base",
          "IQ_mod",
          "HT_base",
          "HT_mod",
        ];

        inputs.forEach((id) => {
          document.getElementById(id).addEventListener("input", triggerAutoRun);
        });
      }

      // -----------------------
      // LOAD ADVANTAGES
      // -----------------------
      async function loadAdvantages() {
        const res = await fetch("/api/advantages");
        advantages = await res.json();

        const sel = document.getElementById("advSelect");
        sel.innerHTML = "";

        advantages.forEach((a) => {
          const opt = document.createElement("option");
          opt.value = a.advantage_id;
          opt.textContent = `${a.advantage_box_name} (${a.advantage_cost})`;
          sel.appendChild(opt);
        });
      }

      function addAdv() {
        const sel = document.getElementById("advSelect");
        const opt = sel.selectedOptions[0];

        selectedAdv.push(opt.value);
        renderLists();
        triggerAutoRun();
      }

      // -----------------------
      // LOAD DISADVANTAGES
      // -----------------------
      async function loadDisadvantages() {
        const res = await fetch("/api/disadvantages");
        disadvantages = await res.json();

        const sel = document.getElementById("disSelect");
        sel.innerHTML = "";

        disadvantages.forEach((d) => {
          const opt = document.createElement("option");
          opt.value = d.disadvantage_id;
          opt.textContent = `${d.disadvantage_box_name} (${d.disadvantage_cost})`;
          sel.appendChild(opt);
        });
      }

      function addDis() {
        const sel = document.getElementById("disSelect");
        const opt = sel.selectedOptions[0];

        selectedDis.push(opt.value);
        renderLists();
        triggerAutoRun();
      }

      // -----------------------
      // RENDER LISTS
      // -----------------------
      function renderLists() {
        document.getElementById("advList").innerHTML = selectedAdv
          .map((a) => `<li>${a}</li>`)
          .join("");

        document.getElementById("disList").innerHTML = selectedDis
          .map((d) => `<li>${d}</li>`)
          .join("");
      }

      // -----------------------
      // RUN ENGINE
      // -----------------------
      async function runEngine() {
        const res = await fetch("/api/character/build", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            advantages: selectedAdv,
            disadvantages: selectedDis,
            primaryAttributes: getPrimaryAttributes(),
          }),
        });

        const json = await res.json();

        document.getElementById("out").textContent = JSON.stringify(
          json,
          null,
          2,
        );
      }

      // -----------------------
      // INIT
      // -----------------------
      window.onload = () => {
        setupAutoRun();
        runEngine(); // initial render
      };
    </script>
  </body>
</html>
